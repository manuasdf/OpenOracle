<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenOracle - Decision Maker</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem;
            text-align: center;
            background-color: #f5f5f5;
            color: #333;
        }
        
        h1 {
            color: #2c3e50;
            font-weight: 600;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }
        
        button:hover {
            background-color: #2980b9;
        }
        
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        
        .result {
            margin-top: 2rem;
            padding: 1.5rem;
            border-radius: 8px;
            font-size: 1.2rem;
            font-weight: 500;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result.winner {
            background-color: #d4edda;
            color: #155724;
            border: 2px solid #c3e6cb;
        }
        
        .result.loser {
            background-color: #f8d7da;
            color: #721c24;
            border: 2px solid #f5c6cb;
        }
        
        .oracle-icon {
            font-size: 3rem;
            margin: 1rem 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 OpenOracle</h1>
        <p>Can't decide? Let the oracle choose for you.</p>
        
        <div>
            <input type="text" id="option1" placeholder="Option 1" autocomplete="off">
            <input type="text" id="option2" placeholder="Option 2" autocomplete="off">
            <button id="decideBtn" disabled>Ask the Oracle</button>
        </div>
        
        <div id="result" class="result"></div>
    </div>
    
    <script>
        // Use crypto.getRandomValues() for cryptographically secure randomness
        function getRandomChoice() {
            const array = new Uint32Array(1);
            window.crypto.getRandomValues(array);
            return array[0] % 2 === 0; // 50/50 chance
        }
        
        const option1Input = document.getElementById('option1');
        const option2Input = document.getElementById('option2');
        const decideBtn = document.getElementById('decideBtn');
        const resultDiv = document.getElementById('result');
        
        // Enable button only when both options are filled
        function checkInputs() {
            decideBtn.disabled = !option1Input.value.trim() || !option2Input.value.trim();
        }
        
        option1Input.addEventListener('input', checkInputs);
        option2Input.addEventListener('input', checkInputs);
        
        decideBtn.addEventListener('click', function() {
            const option1 = option1Input.value.trim();
            const option2 = option2Input.value.trim();
            
            const isOption1 = getRandomChoice();
            
            if (isOption1) {
                resultDiv.textContent = `🎉 ${option1} is chosen!`;
                resultDiv.className = 'result show winner';
            } else {
                resultDiv.textContent = `🎉 ${option2} is chosen!`;
                resultDiv.className = 'result show winner';
            }
        });
    </script>
</body>
</html>
